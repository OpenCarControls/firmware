name: Tag And Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Optional comma-separated platform slugs (for example: virtual-car)"
        required: false
        type: string
        default: ""
      force_all:
        description: "Create a new tag for selected platforms even without detected code changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  tag:
    name: Compute and create release tags
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.tag.outputs.releases }}
      has_releases: ${{ steps.tag.outputs.has_releases }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history needed for git log / git tag

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute and push tags
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          EVENT_NAME="${{ github.event_name }}"
          REQUESTED_PLATFORMS_RAW="${{ github.event.inputs.platforms || '' }}"
          FORCE_ALL="${{ github.event.inputs.force_all || false }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual run requested."
            echo "  platforms input: ${REQUESTED_PLATFORMS_RAW:-<empty>}"
            echo "  force_all: $FORCE_ALL"
          fi

          # Discover all platform slugs from the cars/ directory.
          # Each sub-directory in cars/ is a platform folder whose name IS the slug
          # (e.g. cars/virtual-car → virtual-car).
          DISCOVERED_PLATFORMS=$(find cars -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          if [ -z "$DISCOVERED_PLATFORMS" ]; then
            echo "No platforms found under cars/ — nothing to tag."
            echo 'releases=[]' >> "$GITHUB_OUTPUT"
            echo 'has_releases=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Optional manual filter: comma-separated slugs in workflow_dispatch input.
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${REQUESTED_PLATFORMS_RAW// /}" ]; then
            REQUESTED_PLATFORMS=$(echo "$REQUESTED_PLATFORMS_RAW" | tr ',' '\n' | sed 's/^\s*//; s/\s*$//' | grep -v '^$' | sort -u)
            PLATFORMS=""

            while IFS= read -r P; do
              if echo "$DISCOVERED_PLATFORMS" | grep -qx "$P"; then
                PLATFORMS="${PLATFORMS}${PLATFORMS:+$'\n'}${P}"
              else
                echo "Unknown platform requested: $P"
                exit 1
              fi
            done <<< "$REQUESTED_PLATFORMS"
          else
            PLATFORMS="$DISCOVERED_PLATFORMS"
          fi

          if [ -z "$PLATFORMS" ]; then
            echo "No platforms selected — nothing to tag."
            echo 'releases=[]' >> "$GITHUB_OUTPUT"
            echo 'has_releases=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASES=""
          SEP=""

          for PLATFORM in $PLATFORMS; do
            echo "──────────────────────────────────────"
            echo "Platform: $PLATFORM"

            # ── 1. Find the most recent tag for this platform ───────────────
            LAST_TAG=$(git tag --list "car-${PLATFORM}-v*" \
              | sort -V | tail -n 1 || true)

            if [ -z "$LAST_TAG" ]; then
              echo "  No existing tag — using repo root as base."
              BASE_REF=$(git rev-list --max-parents=0 HEAD)
              LAST_VERSION="0.0.0"
            else
              echo "  Last tag: $LAST_TAG"
              BASE_REF="$LAST_TAG"
              # Strip the prefix to get the bare semver (e.g. "0.1.2")
              LAST_VERSION="${LAST_TAG#car-${PLATFORM}-v}"
            fi

            # ── 2. Check if any relevant paths changed since the last tag ───
            CHANGED=$(git diff --name-only "$BASE_REF" HEAD -- \
              "cars/${PLATFORM}/" \
              "core-interface/" \
              "boards/" \
              || true)

            if [ "$FORCE_ALL" != "true" ] && [ -z "$CHANGED" ]; then
              echo "  No relevant changes — skipping."
              continue
            fi

            if [ "$FORCE_ALL" = "true" ] && [ -z "$CHANGED" ]; then
              echo "  No relevant changes, but force_all=true so a release tag will still be created."
            fi

            echo "  Changed paths:"
            echo "$CHANGED" | sed 's/^/    /'

            # ── 3. Determine bump level from conventional commits ───────────
            COMMITS=$(git log "${BASE_REF}..HEAD" --pretty=format:"%s" -- \
              "cars/${PLATFORM}/" \
              "core-interface/" \
              "boards/" \
              || true)

            BUMP="patch"

            while IFS= read -r MSG; do
              # Breaking change: "BREAKING CHANGE:" in body, or "!:" in subject
              if echo "$MSG" | grep -qiE '(BREAKING[[:space:]]CHANGE|!:)'; then
                BUMP="major"
                break
              fi
              # New feature: "feat:" or "feat(...):" prefix
              if [ "$BUMP" != "major" ] && echo "$MSG" | grep -qiE '^feat(\(.+\))?!?:'; then
                BUMP="minor"
              fi
            done <<< "$COMMITS"

            echo "  Bump type: $BUMP"

            # ── 4. Compute next version ──────────────────────────────────────
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NEW_TAG="car-${PLATFORM}-v${NEXT_VERSION}"

            # ── 5. Guard: skip if tag already exists ────────────────────────
            if git tag --list "$NEW_TAG" | grep -q .; then
              echo "  Tag $NEW_TAG already exists — skipping."
              continue
            fi

            echo "  Creating tag: $NEW_TAG"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"

            RELEASES="${RELEASES}${SEP}{\"platform\":\"${PLATFORM}\",\"version\":\"${NEXT_VERSION}\",\"tag\":\"${NEW_TAG}\"}"
            SEP=","
          done

          echo "──────────────────────────────────────"
          if [ -z "$RELEASES" ]; then
            echo "No tags created."
            echo 'releases=[]' >> "$GITHUB_OUTPUT"
            echo 'has_releases=false' >> "$GITHUB_OUTPUT"
          else
            echo "Created release set: [$RELEASES]"
            echo "releases=[$RELEASES]" >> "$GITHUB_OUTPUT"
            echo 'has_releases=true' >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build and publish (${{ matrix.tag }})
    needs: tag
    if: needs.tag.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.tag.outputs.releases) }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ matrix.tag }}
          submodules: true

      - name: Ensure tags are available
        run: git fetch --tags --force

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain (Xtensa / ESP)
        uses: esp-rs/xtensa-toolchain@v1.6
        with:
          buildtargets: esp32s3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Install espflash
        run: cargo install espflash --locked

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.tag }}

      - name: Verify checked out tag matches matrix tag
        run: |
          set -euo pipefail
          ACTUAL_TAG=$(git describe --tags --exact-match HEAD)
          [ "$ACTUAL_TAG" = "${{ matrix.tag }}" ] || {
            echo "Expected tag ${{ matrix.tag }} but found $ACTUAL_TAG"
            exit 1
          }

      - name: Create config.toml from example
        run: cp config.toml.example config.toml

      - name: Build PC firmware and package artifact
        run: |
          set -euo pipefail
          PLATFORM="${{ matrix.platform }}"
          VERSION="${{ matrix.version }}"

          cargo xtask build --board pc --platform "$PLATFORM"

          PC_OUT="open-car-${PLATFORM}-pc-v${VERSION}"
          cp .app_build/target/release/app-build "./$PC_OUT"
          echo "PC_OUT=$PC_OUT" >> "$GITHUB_ENV"

      - name: Build ESP firmware and package merged .bin
        run: |
          set -euo pipefail
          PLATFORM="${{ matrix.platform }}"
          VERSION="${{ matrix.version }}"

          cargo xtask build --board esp --platform "$PLATFORM"

          MCU=$(grep -E '^\s*mcu\s*=' config.toml.example | head -n1 | sed 's/.*=\s*"\(.*\)"/\1/')
          case "$MCU" in
            esp32)   TRIPLE="xtensa-esp32-none-elf" ;;
            esp32s3) TRIPLE="xtensa-esp32s3-none-elf" ;;
            esp32c3) TRIPLE="riscv32imc-unknown-none-elf" ;;
            esp32c6) TRIPLE="riscv32imac-unknown-none-elf" ;;
            *)       echo "Unknown MCU: $MCU"; exit 1 ;;
          esac

          ELF=".app_build/target/${TRIPLE}/release/app-build"
          ESP_OUT="open-car-${PLATFORM}-${MCU}-v${VERSION}.bin"

          espflash save-image --chip "$MCU" --merge "$ELF" "./$ESP_OUT"

          echo "MCU=$MCU" >> "$GITHUB_ENV"
          echo "ESP_OUT=$ESP_OUT" >> "$GITHUB_ENV"

      - name: Compute checksums
        run: sha256sum "$PC_OUT" "$ESP_OUT" > checksums.sha256

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail

          PLATFORM="${{ matrix.platform }}"
          CURRENT_TAG="${{ matrix.tag }}"

          PLATFORM_TITLE=$(echo "$PLATFORM" | sed 's/-/ /g; s/\b\(.\)/\u\1/g')

          PREV_TAG=$(git tag --list "car-${PLATFORM}-v*" \
            | sort -V | grep -v "^${CURRENT_TAG}$" | tail -n1 || true)

          {
            if [ -z "$PREV_TAG" ]; then
              echo "Initial release."
            else
              echo "Generating notes from ${PREV_TAG}..${CURRENT_TAG}" >&2
              COMMITS=$(git log "${PREV_TAG}..${CURRENT_TAG}" \
                --pretty=format:"%s" \
                -- "cars/${PLATFORM}/" "core-interface/" "boards/" \
                | head -100)

              FEATURES=$(echo "$COMMITS" | grep -iE '^feat(\(.+\))?!?:' | sed 's/^/- /' || true)
              FIXES=$(echo "$COMMITS"    | grep -iE '^fix(\(.+\))?!?:'  | sed 's/^/- /' || true)
              OTHERS=$(echo "$COMMITS"   | grep -ivE '^(feat|fix)(\(.+\))?!?:' | sed 's/^/- /' || true)

              if [ -z "$FEATURES$FIXES$OTHERS" ]; then
                echo "No changes recorded — see full diff for details."
              else
                [ -n "$FEATURES" ] && printf "## What's New\n%s\n\n" "$FEATURES"
                [ -n "$FIXES"    ] && printf "## Bug Fixes\n%s\n\n"  "$FIXES"
                [ -n "$OTHERS"   ] && printf "## Other Changes\n%s\n" "$OTHERS"
              fi
            fi
          } > release_notes.txt

          echo "platform_title=$PLATFORM_TITLE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PLATFORM_TITLE="${{ steps.notes.outputs.platform_title }}"
          VERSION="${{ matrix.version }}"
          TAG="${{ matrix.tag }}"

          gh release create "$TAG" \
            --title "${PLATFORM_TITLE} v${VERSION}" \
            --notes-file release_notes.txt \
            "$PC_OUT" "$ESP_OUT" checksums.sha256
