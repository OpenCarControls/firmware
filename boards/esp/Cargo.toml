[package]
name = "board-esp"
version = "0.1.0"
edition = "2024"

[dependencies]
core-interface = { path = "../../core-interface" }
esp-hal = { version = "1.0.0", features = ["unstable"] }
esp-rtos = { version = "0.2.0", features = ["embassy"] }
esp-println = { version = "0.16.1", features = ["log-04"] }
log = "0.4.29"
embassy-executor = "0.9.1"
embassy-time = "0.5.1"
embedded-hal = "1.0.0"
embedded-hal-bus = "0.3.0"
embedded-can = "0.4.1"
mcp2515 = "0.3.0"
nb = "1.1.0"
