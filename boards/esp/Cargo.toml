[package]
name = "board-esp"
version = "0.1.0"
edition = "2024"

[features]
# Enables all ESP HAL and peripheral driver dependencies.
# Required for firmware builds; omit when running host-side unit tests
# (e.g. `cargo test -p board-esp` or `cargo xtask test`).
hardware = [
    "dep:esp-hal",
    "dep:esp-rtos",
    "dep:esp-println",
    "dep:log",
    "dep:embassy-executor",
    "dep:embassy-time",
    "dep:embedded-hal",
    "dep:embedded-hal-bus",
    "dep:mcp2515",
    "dep:nb",
]

[dependencies]
core-interface   = { path = "../../core-interface" }
embedded-can     = "0.4.1"
esp-hal          = { version = "1.0.0", features = ["unstable"], optional = true }
esp-rtos         = { version = "0.2.0", features = ["embassy"],  optional = true }
esp-println      = { version = "0.16.1", features = ["log-04"],  optional = true }
log              = { version = "0.4.29",                         optional = true }
embassy-executor = { version = "0.9.1",                          optional = true }
embassy-time     = { version = "0.5.1",                          optional = true }
embedded-hal     = { version = "1.0.0",                          optional = true }
embedded-hal-bus = { version = "0.3.0",                          optional = true }
mcp2515          = { version = "0.3.0",                          optional = true }
nb               = { version = "1.1.0",                          optional = true }
