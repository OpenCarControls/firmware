[package]
name = "board-esp"
version = "0.1.0"
edition = "2024"

[features]
# Enables all ESP HAL and peripheral driver dependencies.
# Required for firmware builds; omit when running host-side unit tests
# (e.g. `cargo test -p board-esp` or `cargo xtask test`).
hardware = [
    "dep:esp-hal",
    "dep:esp-rtos",
    "dep:esp-println",
    "dep:log",
    "dep:embassy-executor",
    "dep:embassy-time",
    "dep:embassy-net",
    "dep:embedded-hal",
    "dep:embedded-hal-bus",
    "dep:embedded-io-async",
    "dep:esp-radio",
    "dep:rust-mqtt",
    "dep:prost",
    "dep:smoltcp",
    "dep:mcp2515",
    "dep:nb",
    "dep:static_cell",
]

[dependencies]
core-interface   = { path = "../../core-interface" }
embedded-can     = "0.4.1"
esp-hal          = { version = "1.0.0", features = ["unstable"], optional = true }
esp-rtos         = { version = "0.2.0", features = ["embassy", "esp-radio", "esp-alloc"], optional = true }
esp-println      = { version = "0.16.1", features = ["log-04"],  optional = true }
log              = { version = "0.4.29",                         optional = true }
embassy-executor = { version = "0.9.1",                          optional = true }
embassy-time     = { version = "0.5.1",                          optional = true }
embedded-hal     = { version = "1.0.0",                          optional = true }
embedded-hal-bus = { version = "0.3.0",                          optional = true }
embassy-net      = { version = "0.9.0", features = ["tcp", "dhcpv4", "medium-ethernet"], optional = true }
embedded-io-async = { version = "0.7",                           optional = true }
esp-radio        = { version = "0.17.0", features = ["wifi", "smoltcp", "unstable"],         optional = true }
rust-mqtt        = { version = "0.5.1",  features = ["v5", "alloc"],         optional = true }
prost            = { workspace = true,                                              optional = true }
smoltcp          = { version = "0.12.0", default-features = false, features = ["socket-tcp", "proto-ipv4"], optional = true }
static_cell      = { version = "2",                              optional = true }
mcp2515          = { version = "0.3.0",                          optional = true }
nb               = { version = "1.1.0",                          optional = true }
